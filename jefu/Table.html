<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cars.com</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            border: 4px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }

        img {
            width: 150px;
            height: 100px;
        }
    </style>
</head>

<body>

    <h1>Cars.com</h1>

    <h2>Available Cars</h2>

    <table>
        <tr>
            <th>Car Image</th>
            <th>Car Name</th>
            <th>Country</th>
        </tr>

        <tr>
            <td>
                <img src="images/Benz.jpg" alt="Benz">
            </td>
            <td>Benz</td>
            <td>Germany</td>
        </tr>

        <tr>
            <td>
                <img src="images/Mustang.jpg" alt="Mustang">
            </td>
            <td>Mustang</td>
            <td>USA</td>
        </tr>

        <tr>
            <td>
                <img src="images/volkswagen.jpg" alt="Volkswagen">
            </td>
            <td>Volkswagen</td>
            <td>Germany</td>
        </tr>

        <tr>
            <td>
                <img src="images/bmw.jpg" alt="BMW">
            </td>
            <td>BMW</td>
            <td>Germany</td>
        </tr>

    </table>

</body>
</html>
